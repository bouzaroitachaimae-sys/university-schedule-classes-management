{% extends "base.html" %}
{% block content %}
<div class="page form-page">
  <h1>Nouvelle reservation</h1>
  <form method="POST">
    <label>Salle</label>
    <select name="idSalle" required>
      <option value="">-- Choisir une salle --</option>
      {% for s in salles %}
      <option value="{{ s.idSalle }}">{{ s.nomSalle }} ({{ s.type }}, {{ s.capacite }} places)</option>
      {% endfor %}
    </select>
    <label>Date et heure</label>
    <input type="datetime-local" name="dateHeure" required>
    <label>Duree (en heures)</label>
    <input type="number" name="duree" min="1" max="8" value="2" required>
    <label>Motif</label>
    <textarea name="motif" placeholder="Raison de la reservation..."></textarea>
    <button type="submit" class="btn">Soumettre la demande</button>
    <a href="{{ url_for('reservation.liste_reservations') }}" class="btn-back">Retour</a>
  </form>
</div>
{% endblock %}
